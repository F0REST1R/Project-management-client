<header class="header">
	<input
		class="header__search"
		placeholder="Search..."
	>
	<div class="header__datetime" id="datetimeContainer">
        <div class="datetime__weekday" id="currentWeekday"></div>
        <div class="datetime__date" id="currentDate"></div>
        <div class="datetime__time" id="currentTime"></div>
    </div>
	<div class="header__user">
		<span class="header__name" id="userName">
		</span>
		<span class="header__role" id="userRole">
		</span>
	</div>
	
</header>
