<!DOCTYPE html>
<html lang="en">

<head>
	<script src="https://unpkg.com/lucide@latest"></script>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>Project Management System</title>

	<link rel="stylesheet" href="../../css/dashboard.css">

</head>

<body>

	<div class="layout">

		<!-- SIDEBAR -->

		<div id="sidebar"></div>

		<!-- MAIN -->

		<div class="main">

			<!-- HEADER -->

			<div id="header"></div>

			<!-- WORKSPACE -->

			<main class="workspace">

				<h1 class="workspace__title">
					Dashboard
				</h1>

				<div class="stats">

					<div class="stat-card">

						<h3>
							Active Projects
						</h3>

						<p>
							12
						</p>

					</div>

					<div class="stat-card">

						<h3>
							Tasks Today
						</h3>

						<p>
							34
						</p>

					</div>

					<div class="stat-card">

						<h3>
							Overdue Tasks
						</h3>

						<p>
							5
						</p>

					</div>

					<div class="stat-card">

						<h3>
							Team Workload
						</h3>

						<p>
							78%
						</p>

					</div>

				</div>

			</main>

		</div>

	</div>

	<script src="../../js/layout.js"></script>

</body>

</html>
