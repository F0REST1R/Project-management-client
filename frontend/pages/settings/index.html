<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://unpkg.com/lucide@latest"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Settings - Project Management System</title>
    <link rel="stylesheet" href="../../css/dashboard.css">
    <link rel="stylesheet" href="../../css/settings.css">
</head>
<body>
    <div class="layout">
        <!-- SIDEBAR -->
        <div id="sidebar"></div>

        <!-- MAIN -->
        <div class="main">
            <!-- HEADER -->
            <div id="header"></div>

            <!-- SETTINGS WORKSPACE -->
            <main class="settings-workspace">
                <div class="settings-header">
                    <h1 class="settings-title">Settings</h1>
                </div>

                <div class="settings-container">
                    <!-- Profile Settings -->
                    <div class="settings-card">
                        <div class="settings-card__header">
                            <i data-lucide="user" class="settings-card__icon"></i>
                            <h2>Profile Information</h2>
                        </div>
                        
                        <div class="settings-form">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="firstName">First Name</label>
                                    <input type="text" id="firstName" class="settings-input" placeholder="Enter first name">
                                    <span class="input-error" id="firstNameError"></span>
                                </div>
                                
                                <div class="form-group">
                                    <label for="lastName">Last Name</label>
                                    <input type="text" id="lastName" class="settings-input" placeholder="Enter last name">
                                    <span class="input-error" id="lastNameError"></span>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="email">Email Address</label>
                                <input type="email" id="email" class="settings-input" placeholder="Enter email" readonly>
                                <span class="input-hint">Email cannot be changed</span>
                            </div>

                            <div class="form-group">
                                <label for="role">Role</label>
                                <input type="text" id="role" class="settings-input" readonly>
                                <span class="input-hint">Role is assigned by administrator</span>
                            </div>
                        </div>
                    </div>

                    <!-- Change Password -->
                    <div class="settings-card">
                        <div class="settings-card__header">
                            <i data-lucide="lock" class="settings-card__icon"></i>
                            <h2>Change Password</h2>
                        </div>
                        
                        <div class="settings-form">
                            <div class="form-group">
                                <label for="currentPassword">Current Password</label>
                                <div class="password-field">
                                    <input type="password" id="currentPassword" class="settings-input" placeholder="Enter current password">
                                    <i data-lucide="eye" class="toggle-password" onclick="togglePassword('currentPassword')"></i>
                                </div>
                                <span class="input-error" id="currentPasswordError"></span>
                            </div>

                            <div class="form-group">
                                <label for="newPassword">New Password</label>
                                <div class="password-field">
                                    <input type="password" id="newPassword" class="settings-input" placeholder="Enter new password">
                                    <i data-lucide="eye" class="toggle-password" onclick="togglePassword('newPassword')"></i>
                                </div>
                                <span class="input-hint">Minimum 6 characters</span>
                                <span class="input-error" id="newPasswordError"></span>
                            </div>

                            <div class="form-group">
                                <label for="confirmPassword">Confirm New Password</label>
                                <div class="password-field">
                                    <input type="password" id="confirmPassword" class="settings-input" placeholder="Confirm new password">
                                    <i data-lucide="eye" class="toggle-password" onclick="togglePassword('confirmPassword')"></i>
                                </div>
                                <span class="input-error" id="confirmPasswordError"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Feedback & Support -->
                    <div class="settings-card">
                        <div class="settings-card__header">
                            <i data-lucide="message-circle" class="settings-card__icon"></i>
                            <h2>Feedback & Support</h2>
                        </div>
                        
                        <div class="settings-form">
                            <div class="form-group">
                                <label for="feedbackType">Type</label>
                                <select id="feedbackType" class="settings-select">
                                    <option value="bug">Bug Report</option>
                                    <option value="feature">Feature Request</option>
                                    <option value="question">Question</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="feedbackSubject">Subject</label>
                                <input type="text" id="feedbackSubject" class="settings-input" placeholder="Brief subject">
                                <span class="input-error" id="subjectError"></span>
                            </div>

                            <div class="form-group">
                                <label for="feedbackMessage">Message</label>
                                <textarea id="feedbackMessage" class="settings-textarea" rows="4" placeholder="Describe your issue or suggestion..."></textarea>
                                <span class="input-error" id="messageError"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="settings-actions">
                        <button class="settings-btn settings-btn--secondary" id="cancelBtn">Cancel</button>
                        <button class="settings-btn settings-btn--primary" id="saveProfileBtn">Save Changes</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../js/layout.js"></script>
    <script src="../../js/settings.js"></script>
</body>
</html>
