<!DOCTYPE html>
<html lang="en">

<head>

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>Clients</title>

	<link rel="stylesheet" href="../../css/dashboard.css">
	<link rel="stylesheet" href="../../css/clients.css">

	<script src="https://unpkg.com/lucide@latest"></script>

</head>

<body>

	<div class="layout">

		<div id="sidebar"></div>

		<div class="main">

			<div id="header"></div>

			<main class="workspace">

				<div class="clients-header">

					<h1>
						Clients
					</h1>

					<button class="create-client" id="openClientModal">
						Create Client
					</button>

				</div>

				<div class="clients-search">

					<input
						type="text"
						placeholder="Search client..."
						class="client-search-input"
					>

				</div>

				<table class="clients-table">

					<thead>

						<tr>

							<th>Name</th>
							<th>INN</th>
							<th>Email</th>
							<th>Phone</th>
							<th>Stage</th>
							<th>Projects</th>

						</tr>

					</thead>

					<tbody>

						<tr>

							<td>Acme Corp</td>
							<td>7712345678</td>
							<td>contact@acme.com</td>
							<td>+7 900 000 00 00</td>
							<td>Negotiation</td>
							<td>3</td>

						</tr>

						<tr>

							<td>Tech Ltd</td>
							<td>7722222222</td>
							<td>tech@mail.com</td>
							<td>+7 900 111 11 11</td>
							<td>Active</td>
							<td>1</td>

						</tr>

					</tbody>

				</table>

			</main>

		</div>

	</div>

	<script src="../../js/layout.js"></script>

    <div class="modal" id="clientModal">

        <div class="modal-content">

            <h2>Create Client</h2>

            <div class="form-group">

                <label>
                    Company name *
                </label>

                <input
                    type="text"
                    id="clientName"
                    placeholder="Company name"
                >

            </div>

            <div class="form-group">

                <label>
                    INN *
                </label>

                <input
                    type="text"
                    id="clientInn"
                    placeholder="10 or 12 digits"
                >

            </div>

            <div class="form-group">

                <label>
                    Email
                </label>

                <input
                    type="email"
                    id="clientEmail"
                    placeholder="example@mail.com"
                >

            </div>

            <div class="form-group">

                <label>
                    Phone
                </label>

                <input
                    type="text"
                    id="clientPhone"
                    placeholder="+7 ..."
                >

            </div>

            <div class="form-group">

                <label>
                    Negotiation stage *
                </label>

                <div class="dropdown" id="stageDropdown">

                    <div class="dropdown-selected">

                        Negotiation

                        <span class="dropdown-arrow">▼</span>

                    </div>

                    <div class="dropdown-menu">

                        <div class="dropdown-item" data-value="Lead">
                            Lead
                        </div>

                        <div class="dropdown-item" data-value="Commercial Offer">
                            Commercial Offer
                        </div>

                        <div class="dropdown-item" data-value="Negotiation">
                            Negotiation
                        </div>

                        <div class="dropdown-item" data-value="Signed">
                            Signed
                        </div>

                    </div>

                </div>


            </div>

            <div
                class="form-error"
                id="clientError"
            ></div>

            <div class="modal-actions">

                <button id="createClientBtn">
                    Create
                </button>

                <button id="closeClientModal">
                    Cancel
                </button>

            </div>

        </div>

    </div>

    <script src="../../js/layout.js"></script>
    <script src="../../js/clients.js"></script>
</body>

</html>
